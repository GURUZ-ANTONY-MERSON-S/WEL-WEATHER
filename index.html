<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEL-Weather | Splash Screen</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Inline Splash CSS -->
  <style>
    :root {
      --bg-dark: #0F1012;
      --accent-blue: #6366f1;
      --accent-cyan: #818cf8;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    .splash-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    
    .logo-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 2rem;
      border-radius: 30px;
      padding: 15px;
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      animation: pulseGlow 3s infinite ease-in-out;
    }
    
    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 15px;
    }
    
    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, var(--text-main) 30%, var(--accent-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 3rem;
    }
    
    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      display: inline-block;
      position: relative;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }
    
    .loader::after {
      content: '';  
      box-sizing: border-box;
      position: absolute;
      left: 0;
      top: 0;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }
    
    .status-text {
      margin-top: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent-cyan);
      letter-spacing: 0.05em;
    }
    
    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
    
    @keyframes pulseGlow {
      0%, 100% {
        box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 50px rgba(6, 182, 212, 0.3);
        transform: scale(1.03);
      }
    }
    
    /* Background grid */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }
    
    .bg-gradient-radial {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-gradient-radial"></div>

  <div class="splash-container">
    <div class="logo-container" id="logoContainer">
      <img src="/assets/logo/wel-weather-logo.png" alt="WEL-Weather Logo" class="logo-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%233b82f6\' stroke-width=\'1.5\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.5 19A3.5 3.5 0 0 0 21 15.5c0-2.79-2.54-4.5-5-4.5-.42-1.89-1.76-3.5-3.5-4.08a4.5 4.5 0 0 0-6.75 3.33A5 5 0 0 0 2 15.5C2 18.1 4.4 20 7 20h10.5c.33 0 .66-.03.97-.1\'/></svg>'">
    </div>
    <h1 class="title">WEL-Weather</h1>
    <div class="subtitle">Meteorological Station v1.0</div>
    <div class="loader"></div>
    <div class="status-text" id="statusText">Initializing core weather engines...</div>
  </div>

  <script src="/js/config.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const statusText = document.getElementById('statusText');
      const logoContainer = document.getElementById('logoContainer');
      
      const steps = [
        { text: 'Loading configuration layers...', delay: 400 },
        { text: 'Booting thunderstorm rule-based engine...', delay: 800 },
        { text: 'Establishing meteorological handshake...', delay: 1200 },
        { text: 'Checking user authentication state...', delay: 1600 }
      ];
      
      steps.forEach(step => {
        setTimeout(() => {
          statusText.textContent = step.text;
        }, step.delay);
      });
      
      // Perform redirect check
      setTimeout(() => {
        // Quick check for existing user session
        const storedUser = localStorage.getItem('wel_weather_user');
        
        // Add fade out animation
        document.body.style.transition = 'opacity 0.6s ease';
        document.body.style.opacity = '0';
        
        setTimeout(() => {
          if (storedUser) {
            window.location.href = '/dashboard.html';
          } else {
            window.location.href = '/login.html';
          }
        }, 600);
      }, 2200);
    });
  </script>
</body>
</html>
