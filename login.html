<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEL-Weather | Secure Login</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body class="login-body">
  
  <!-- Background Image & Overlay -->
  <div class="login-bg-overlay"></div>
  <div class="login-bg" id="loginBg"></div>

  <!-- Loading Overlay -->
  <div class="login-loader-overlay" id="loginLoader">
    <div class="loader-content">
      <div class="spinner"></div>
      <div class="loader-status" id="loaderStatus">Authenticating with meteorological servers...</div>
    </div>
  </div>

  <!-- Main Container -->
  <div class="login-container">
    <!-- Login Card -->
    <div class="login-card" id="loginCard">
      <!-- Logo and Header -->
      <div class="login-header">
        <div class="logo-box">
          <img src="/assets/logo/wel-weather-logo.png" alt="WEL-Weather Logo" class="logo-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%233b82f6\' stroke-width=\'1.5\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><path d=\'M17.5 19A3.5 3.5 0 0 0 21 15.5c0-2.79-2.54-4.5-5-4.5-.42-1.89-1.76-3.5-3.5-4.08a4.5 4.5 0 0 0-6.75 3.33A5 5 0 0 0 2 15.5C2 18.1 4.4 20 7 20h10.5c.33 0 .66-.03.97-.1\'/></svg>'">
        </div>
        <h2 class="title">WEL-Weather</h2>
        <p class="subtitle">Access your meteorological command center</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="login-form">
        <!-- Error Message Bar -->
        <div class="error-banner" id="errorBanner">
          <span class="error-text" id="errorText">Invalid username or password.</span>
        </div>

        <div class="form-group">
          <label for="username">Meteorologist Username / Email</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="username" name="username" placeholder="Enter username or email" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Security Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <!-- Form Utilities -->
        <div class="form-utils">
          <label class="checkbox-container">
            <input type="checkbox" id="rememberMe">
            <span class="checkmark"></span>
            Remember Me
          </label>
          <a href="#" class="forgot-password" id="forgotPasswordBtn">Forgot Access Key?</a>
        </div>

        <!-- Submit Buttons -->
        <div class="btn-stack">
          <button type="submit" class="btn btn-primary" id="loginBtn">Authorize Session</button>
          <div class="divider">
            <span>or</span>
          </div>
          <button type="button" class="btn btn-secondary" id="guestBtn">Initialize Guest Terminal</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/config.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
